<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>popvote — Phase 0 spike (throwaway)</title>
<!-- AIDEV-NOTE: Phase 0 spike only. Proves the two hardest primitives before any
     product code is written:
       1. burst fan-in — 100 loopback-simulated guest votes arriving inside a 2s
          window, aggregated with zero loss, main thread never blocked >50ms.
       2. recap generation — seeded pure SVG layout functions serialized via
          Function.prototype.toString() into a self-contained HTML string,
          deterministic across two independent runs with the same seed.
     This file is NOT shipped; it is deleted (or left as historical record) once
     Phase 1/2 lift the same function bodies into popvote/index.html. -->
<style>
  body{font-family:system-ui,sans-serif;max-width:56rem;margin:2rem auto;padding:0 1rem;line-height:1.5}
  button{font:inherit;padding:.6rem 1.2rem;margin:.4rem .4rem 0 0;cursor:pointer}
  pre{background:#f4f2ec;padding:1rem;border-radius:8px;overflow:auto;white-space:pre-wrap}
  .pass{color:#1e7a3c;font-weight:700}
  .fail{color:#b3261e;font-weight:700}
  h2{margin-top:2.5rem}
</style>
</head>
<body>
<h1>popvote — Phase 0 spike</h1>
<p>Throwaway harness. Not part of the shipped product.</p>

<h2>1. Burst fan-in (100 guests, 2s window)</h2>
<button id="runBurst">Run burst test</button>
<pre id="burstOut">not run</pre>

<h2>2. Recap generation (determinism + self-containment)</h2>
<button id="runRecap">Run recap test</button>
<pre id="recapOut">not run</pre>

<script>
"use strict";

/* ============================================================
   Shared pure functions (candidates to lift verbatim into
   popvote/index.html in Phase 1/2 — kept parameter-only / no
   closure-captured globals so Function.prototype.toString()
   round-trips cleanly when embedded in the generated recap file).
   ============================================================ */

// mulberry32: small fast seeded PRNG, deterministic across runs/browsers.
function mulberry32(seed){
  let t = seed >>> 0;
  return function(){
    t |= 0; t = (t + 0x6D2B79F5) | 0;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r;
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

function escapeXml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&apos;"
  }[c]));
}

// Pure: options=[{label,count}], returns an SVG string. No DOM access.
function renderBarChartSVG(options, opts){
  opts = opts || {};
  const W = opts.width || 640, rowH = 44, pad = 12;
  const H = pad * 2 + options.length * rowH;
  const max = Math.max(1, ...options.map(o => o.count));
  const winner = Math.max(...options.map(o => o.count));
  let bars = "";
  options.forEach((o, i) => {
    const y = pad + i * rowH;
    const w = Math.round((W - 220) * (o.count / max));
    const isWinner = o.count === winner && winner > 0;
    bars += `<text x="8" y="${y + 22}" font-size="15" font-family="system-ui,sans-serif">${escapeXml(o.label)}</text>` +
      `<rect x="200" y="${y + 6}" width="${Math.max(2, w)}" height="24" rx="6" fill="${isWinner ? "#1e7a3c" : "#8a857c"}"/>` +
      `<text x="${200 + w + 10}" y="${y + 22}" font-size="14" font-family="system-ui,sans-serif">${o.count}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
}

// Pure: words=[{text,count}], seeded spiral placement -> deterministic SVG.
function renderWordCloudSVG(words, seed, opts){
  opts = opts || {};
  const W = opts.width || 640, H = opts.height || 400;
  const rand = mulberry32(seed >>> 0);
  const max = Math.max(1, ...words.map(w => w.count));
  const cx = W / 2, cy = H / 2;
  const placed = [];
  let out = "";
  words
    .slice()
    .sort((a, b) => b.count - a.count)
    .forEach((w, i) => {
      const size = 12 + Math.round((w.count / max) * 34);
      let angle = rand() * Math.PI * 2;
      let radius = 0;
      let x, y, tries = 0;
      do {
        x = cx + Math.cos(angle) * radius;
        y = cy + Math.sin(angle) * radius;
        angle += 0.5;
        radius += 3.2;
        tries++;
      } while (tries < 400 && placed.some(p =>
        Math.abs(p.x - x) < (p.size + size) * 2.1 &&
        Math.abs(p.y - y) < (p.size + size) * 0.9));
      placed.push({ x, y, size });
      out += `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" font-size="${size}" ` +
        `font-family="system-ui,sans-serif" text-anchor="middle" fill="hsl(${(i * 47) % 360},45%,38%)">` +
        `${escapeXml(w.text)}</text>`;
    });
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">${out}</svg>`;
}

function renderQnaListHTML(questions){
  const ranked = questions.slice().sort((a, b) => b.up - a.up);
  return "<ol style=\"padding-left:1.4rem\">" + ranked.map(q =>
    `<li style="margin-bottom:.5rem">${escapeXml(q.txt)} ` +
    `<b>(${q.up}&#9650;)</b>${q.ans ? ' <span style="color:#1e7a3c">[answered]</span>' : ""}</li>`
  ).join("") + "</ol>";
}

function renderTimelineSVG(buckets, opts){
  opts = opts || {};
  const W = opts.width || 640, H = opts.height || 100, pad = 8;
  const max = Math.max(1, ...buckets);
  const stepX = (W - pad * 2) / Math.max(1, buckets.length - 1);
  const pts = buckets.map((v, i) =>
    `${(pad + i * stepX).toFixed(1)},${(H - pad - (v / max) * (H - pad * 2)).toFixed(1)}`
  ).join(" ");
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">` +
    `<polyline points="${pts}" fill="none" stroke="#1e7a3c" stroke-width="2"/></svg>`;
}

/* ============================================================
   Recap assembly: takes a plain session object + a seed, returns
   one self-contained HTML string. Embeds the render fns via
   toString() so the recap always matches whatever code produced
   the live view (see popvote/index.html for the real seam).
   ============================================================ */
function buildRecapHTML(session, seed){
  const fnSrc = [mulberry32, escapeXml, renderBarChartSVG, renderWordCloudSVG, renderQnaListHTML, renderTimelineSVG]
    .map(f => f.toString()).join("\n");

  let body = `<h1>${escapeXml(session.title)}</h1><p>${escapeXml(session.date)} · peak ${session.peak} guests · ${session.totalResponses} responses</p>`;
  session.activities.forEach(a => {
    body += `<h2>${escapeXml(a.title)}</h2>`;
    if (a.kind === "poll") body += renderBarChartSVG(a.options, {});
    else if (a.kind === "wordcloud") body += renderWordCloudSVG(a.words, seed, {});
    else if (a.kind === "qna") body += renderQnaListHTML(a.questions);
  });
  body += `<h2>Participation</h2>${renderTimelineSVG(session.timeline, {})}`;
  body += `<footer>Made with popvote</footer>`;

  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${escapeXml(session.title)} — Recap</title></head>` +
    `<body><script>${fnSrc}<\/script>${body}</body></html>`;
}

function fakeSession(){
  const options = [
    { label: "Coffee", count: 41 }, { label: "Tea", count: 22 },
    { label: "Neither", count: 9 }, { label: "Both", count: 15 },
  ];
  const words = Array.from({ length: 50 }, (_, i) => ({
    text: "word" + i, count: 1 + ((i * 7) % 12),
  }));
  const questions = Array.from({ length: 20 }, (_, i) => ({
    qid: "q" + i, txt: "Question number " + i + "?", up: (i * 3) % 17, ans: i % 4 === 0,
  }));
  return {
    title: "Fake Session", date: "2026-07-14", peak: 87, totalResponses: 213,
    activities: [
      { kind: "poll", title: "Coffee or tea?", options },
      { kind: "wordcloud", title: "One word for this workshop", words },
      { kind: "qna", title: "Q&A", questions },
    ],
    timeline: Array.from({ length: 30 }, (_, i) => 1 + ((i * 13) % 20)),
  };
}

/* ============================================================
   Test 1: burst fan-in
   ============================================================ */
function runBurstTest(){
  const out = document.getElementById("burstOut");
  out.textContent = "running…";
  const N = 100;
  const WINDOW_MS = 2000;
  const tally = new Map();       // guestId -> vote (one vote per guest, re-vote replaces)
  let received = 0;
  let worstFrame = 0;
  let lastFrameTs = performance.now();
  let rafId;

  function frameWatch(ts){
    const dt = ts - lastFrameTs;
    if (dt > worstFrame) worstFrame = dt;
    lastFrameTs = ts;
    rafId = requestAnimationFrame(frameWatch);
  }
  rafId = requestAnimationFrame(frameWatch);

  const t0 = performance.now();
  let acked = 0;
  for (let i = 0; i < N; i++){
    const guestId = "guest" + i;
    const delay = Math.random() * WINDOW_MS;
    setTimeout(() => {
      // AIDEV-NOTE: this is the exact aggregation the real hub does on
      // {t:"vote", a, v} — Map keyed by peer id, re-vote replaces, O(1).
      tally.set(guestId, { v: i % 4, at: performance.now() });
      received++;
      acked++;
      if (acked === N) finish();
    }, delay);
  }

  function finish(){
    cancelAnimationFrame(rafId);
    const elapsed = performance.now() - t0;
    const lossFree = tally.size === N;
    const frameOk = worstFrame <= 50;
    out.innerHTML =
      `votes received: ${received}/${N}\n` +
      `unique tallied: ${tally.size}/${N}  ${lossFree ? '<span class="pass">PASS zero loss</span>' : '<span class="fail">FAIL loss detected</span>'}\n` +
      `elapsed: ${elapsed.toFixed(1)}ms (window ${WINDOW_MS}ms)\n` +
      `worst frame delta: ${worstFrame.toFixed(1)}ms  ${frameOk ? '<span class="pass">PASS &le;50ms</span>' : '<span class="fail">FAIL &gt;50ms</span>'}`;
  }
}

/* ============================================================
   Test 2: recap generation determinism + self-containment
   ============================================================ */
function runRecapTest(){
  const out = document.getElementById("recapOut");
  const session = fakeSession();
  const seed = 424242;
  const htmlA = buildRecapHTML(session, seed);
  const htmlB = buildRecapHTML(session, seed);
  const identical = htmlA === htmlB;

  // self-contained: no external resource references anywhere in the output
  const hasExternal = /\s(?:src|href)\s*=\s*["']https?:\/\//i.test(htmlA);

  const blob = new Blob([htmlA], { type: "text/html" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "popvote-recap-spike-test.html";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);

  out.innerHTML =
    `output size: ${htmlA.length} bytes\n` +
    `deterministic across 2 runs (same seed): ${identical ? '<span class="pass">PASS identical</span>' : '<span class="fail">FAIL differs</span>'}\n` +
    `self-contained (no external src/href): ${!hasExternal ? '<span class="pass">PASS</span>' : '<span class="fail">FAIL external ref found</span>'}\n` +
    `download triggered: popvote-recap-spike-test.html (open it offline to confirm it renders)`;
}

document.getElementById("runBurst").addEventListener("click", runBurstTest);
document.getElementById("runRecap").addEventListener("click", runRecapTest);
</script>
</body>
</html>
