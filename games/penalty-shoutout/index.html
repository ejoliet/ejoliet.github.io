<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1"><title>P2P Penalty</title><style>body{margin:0;background:#06151b;color:#dff;font:14px system-ui;text-align:center}#c{background:linear-gradient(#123,#041);display:block;margin:auto;max-width:100vw;height:56vw;max-height:70vh;touch-action:none}button,textarea{background:#10242b;color:#dff;border:1px solid #4aa;border-radius:6px;margin:4px;padding:7px}textarea{width:44%;height:80px;font-size:11px}#p{max-width:900px;margin:auto}.hide{display:none}b{color:#fff}</style><canvas id=c width=900 height=520></canvas><div id=p><b>P2P Penalty</b> <span id=s></span><br><button onclick=A()>Host / Goalkeeper</button><button onclick=B()>Join / Kicker</button><button onclick=R()>Reset score</button><button onclick=K()>Practice</button><br><textarea id=o placeholder="offer / answer"></textarea><textarea id=i placeholder="paste remote here"></textarea><br><button onclick=C()>Copy local</button><button onclick=D()>Accept pasted</button><p id=h>Host copies offer to kicker. Kicker pastes offer, clicks Accept, copies answer back. Host pastes answer, clicks Accept. No server.</p></div><script>
let c=document.getElementById('c'),x=c.getContext('2d'),S=document.getElementById('s'),O=document.getElementById('o'),I=document.getElementById('i'),H=document.getElementById('h'),pc,dc,role=0,go=0,t=0,me={g:450,a:0,p:.5,k:0},op={g:450,a:0,p:.5,k:0},ball={x:450,y:450,vx:0,vy:0,z:0,vz:0},score=JSON.parse(localStorage.pk||'[0,0]'),msg='Pick a role',down=0,last=0,turn=0;
function save(){localStorage.pk=JSON.stringify(score)}function send(v){if(dc&&dc.readyState=='open')dc.send(JSON.stringify(v))}function on(v){if(v.s){score=v.s;save()} if(v.m)msg=v.m; if(v.turn!=null)turn=v.turn; if(v.g!=null)op=v; if(v.shot)shoot(v.shot,1)}
function wire(){dc.onopen=()=>{msg='Connected. Kicker aims, goalkeeper guards.';send({s:score,turn})};dc.onmessage=e=>on(JSON.parse(e.data))}
async function A(){role=1;pc=new RTCPeerConnection;dc=pc.createDataChannel('p');wire();pc.onicecandidate=e=>{if(!e.candidate)O.value=JSON.stringify(pc.localDescription)};await pc.setLocalDescription(await pc.createOffer())}
async function B(){role=2;pc=new RTCPeerConnection;pc.ondatachannel=e=>{dc=e.channel;wire()};pc.onicecandidate=e=>{if(!e.candidate)O.value=JSON.stringify(pc.localDescription)};msg='Paste host offer, Accept, then send answer back'}
async function D(){let d=JSON.parse(I.value);await pc.setRemoteDescription(d);if(d.type=='offer'){await pc.setLocalDescription(await pc.createAnswer())}}
function C(){O.select();navigator.clipboard&&navigator.clipboard.writeText(O.value)}function R(){score=[0,0];save();send({s:score})}function K(){role=2;msg='Practice mode: AI keeper';go=1}
function P(e){let r=c.getBoundingClientRect();return{x:((e.touches?e.touches[0].clientX:e.clientX)-r.left)*900/r.width,y:((e.touches?e.touches[0].clientY:e.clientY)-r.top)*520/r.height}}
function move(e){let p=P(e);if(role==1){me.g=Math.max(260,Math.min(640,p.x));send(me)}else{me.a=Math.max(-1,Math.min(1,(p.x-450)/250));me.p=Math.max(.2,Math.min(1,(470-p.y)/230));send(me)}}
c.onpointerdown=e=>{down=1;move(e)};c.onpointermove=e=>down&&move(e);c.onpointerup=e=>{down=0;if(role==2&&!go)kick()};c.ontouchstart=e=>{down=1;move(e);e.preventDefault()};c.ontouchmove=e=>{move(e);e.preventDefault()};c.ontouchend=e=>{down=0;if(role==2&&!go)kick();e.preventDefault()};
onkeydown=e=>{if(role==1){me.g+=({ArrowLeft:-25,ArrowRight:25}[e.key]||0);send(me)} if(role==2&&e.key==' ')kick()}
function kick(){if(go||role!=2)return;shoot({a:me.a,p:me.p},0);send({shot:{a:me.a,p:me.p}})}
function shoot(q,remote){go=1;t=0;ball={x:450,y:450,vx:q.a*7,vy:-9*q.p-4,z:0,vz:5*q.p};msg='Shot!';if(role==2&&!remote)turn++}
function step(){requestAnimationFrame(step);let now=Date.now(),dt=Math.min(2,(now-last)/16||1);last=now;if(role==2&&!dc&&go&&t==0)op.g=450+(Math.random()-.5)*320;if(go){t+=dt;ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;ball.z+=ball.vz*dt;ball.vy+=.09*dt;ball.vz-=.13*dt;if(ball.y<155){let g=role==1?me.g:op.g,inside=ball.x>245&&ball.x<655&&ball.z<120,saveit=Math.abs(ball.x-g)<55&&ball.z<105;if(inside&&!saveit){score[1]++;msg='GOAL'}else{score[0]++;msg=saveit?'SAVE':'MISS'}save();send({s:score,m:msg,turn});go=0;ball={x:450,y:450,z:0,vx:0,vy:0,vz:0}}}draw()}
function draw(){x.clearRect(0,0,900,520);x.fillStyle='#0a5';x.fillRect(0,160,900,360);x.strokeStyle='#fff';x.lineWidth=3;x.strokeRect(240,145,420,190);x.beginPath();x.moveTo(240,335);x.lineTo(80,520);x.moveTo(660,335);x.lineTo(820,520);x.stroke();for(let i=0;i<9;i++){x.strokeStyle='#ffffff22';x.beginPath();x.moveTo(80+i*90,520);x.lineTo(300+i*40,145);x.stroke()}let gg=role==1?me.g:op.g;x.fillStyle='#ffdc66';x.fillRect(gg-28,230,56,14);x.fillRect(gg-12,205,24,28);x.beginPath();x.arc(gg,198,12,0,7);x.fill();x.strokeStyle='#ffdc66';x.beginPath();x.moveTo(gg-30,218);x.lineTo(gg-62,235);x.moveTo(gg+30,218);x.lineTo(gg+62,235);x.stroke();let bx=ball.x,by=ball.y-ball.z;if(!go){bx=450;by=450}x.fillStyle='#fff';x.beginPath();x.arc(bx,by,14,0,7);x.fill();x.strokeStyle='#000';x.stroke();if(role==2&&!go){x.strokeStyle='#f44';x.beginPath();x.moveTo(450,450);x.lineTo(450+me.a*170,450-240*me.p);x.stroke();x.fillStyle='#f44';x.fillRect(350,485,200*me.p,10)}x.fillStyle='#dff';x.fillText(msg,20,30);x.fillText((role==1?'GOALKEEPER':role==2?'KICKER':'NO ROLE')+'  Saves '+score[0]+' - Goals '+score[1],20,55);x.fillText('Kicker: drag aim, release/space to shoot. Keeper: drag or arrows.',20,80);S.textContent=' Saves '+score[0]+' | Goals '+score[1]+' | '+(dc&&dc.readyState=='open'?'P2P online':'offline/manual')}
step()
</script>
