<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0"><title>MotoTilt 13k</title><style>
html,body{margin:0;height:100%;overflow:hidden;background:#070912;color:#fff;font:12px system-ui,Segoe UI,sans-serif;touch-action:none}canvas{width:100%;height:100%;display:block;background:radial-gradient(circle at 50% 25%,#182447,#06070d 65%)}#ui{position:fixed;inset:0;pointer-events:none}#top{position:absolute;left:10px;right:10px;top:8px;display:flex;gap:8px;align-items:start;justify-content:space-between}.p{background:#0009;border:1px solid #7df4;border-radius:12px;padding:8px 10px;backdrop-filter:blur(8px);box-shadow:0 0 20px #0ff2}.big{font-size:24px;font-weight:800;letter-spacing:-1px}.tag{display:inline-block;padding:2px 7px;border-radius:99px;background:linear-gradient(90deg,#0ff5,#f0f5);margin:1px;color:#fff}.btn{pointer-events:auto;border:1px solid #fff5;background:#10172acc;color:#fff;border-radius:10px;padding:8px 10px;font-weight:700}#net{position:absolute;left:10px;right:10px;bottom:10px;display:none;gap:6px;flex-wrap:wrap}.show{display:flex!important}textarea,input{pointer-events:auto;background:#050711cc;color:#dff;border:1px solid #38f8;border-radius:8px;padding:7px;font:11px monospace;min-width:130px;max-width:45vw;height:48px}.hint{position:absolute;left:50%;bottom:92px;transform:translateX(-50%);background:#0008;border:1px solid #fff3;border-radius:99px;padding:8px 12px;text-align:center;white-space:nowrap}.flash{animation:f .35s}@keyframes f{50%{filter:brightness(2)}}
</style></head><body><canvas id=c></canvas><div id=ui><div id=top><div class=p><div class=big id=rank>P1</div><div id=stat>tap throttle · tilt steer</div><div id=list></div></div><div><button class=btn id=tilt>enable tilt</button> <button class=btn id=peer>p2p</button></div></div><div class=hint id=hint>hold screen to accelerate · tilt or drag left/right</div><div id=net><button class=btn id=host>host</button><button class=btn id=join>join</button><textarea id=out placeholder="signal output"></textarea><textarea id=inb placeholder="paste signal"></textarea><button class=btn id=go>accept</button></div></div><script>
(()=>{
let C=c,g=C.getContext('2d'),W,H,DPR=1,me=Math.random().toString(36).slice(2,5).toUpperCase(),hue=Math.random()*360|0,peers={},labels={},dc,pc,isHost=0,tiltX=0,drag=0,down=0,last=0,lap=0,L=7200,started=0,boost=0;
let P={id:me,x:0,v:0,z:0,lap:0,name:me,h:hue};
function R(){DPR=Math.min(2,devicePixelRatio||1);W=C.width=innerWidth*DPR;H=C.height=innerHeight*DPR;g.setTransform(DPR,0,0,DPR,0,0);W=innerWidth;H=innerHeight}onresize=R;R();
let $=id=>document.getElementById(id),S=Math.sin,Cos=Math.cos,Abs=Math.abs;
function curve(z){return S(z*.0016)*.55+S(z*.00047)*.38+S(z*.0031)*.12}
function edge(z){return .78-.12*S(z*.002)}
function pos(o){return o.lap*L+o.z}
function flash(t){stat.textContent=t;ui.classList.add('flash');setTimeout(()=>ui.classList.remove('flash'),300)}
function send(){if(dc&&dc.readyState=='open')dc.send(JSON.stringify(P))}
function recv(o){peers[o.id]=Object.assign(peers[o.id]||{},o,{t:performance.now()})}
function pack(x){return btoa(JSON.stringify(x))}function unpack(x){return JSON.parse(atob(x.trim()))}
async function makePC(){pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});pc.onicecandidate=()=>out.value=pack(pc.localDescription);pc.ondatachannel=e=>wire(e.channel)}
function wire(ch){dc=ch;ch.onopen=()=>flash('linked · race live');ch.onmessage=e=>recv(JSON.parse(e.data))}
host.onclick=async()=>{isHost=1;await makePC();wire(pc.createDataChannel('r'));await pc.setLocalDescription(await pc.createOffer());flash('send host code')}
join.onclick=async()=>{await makePC();await pc.setRemoteDescription(unpack(inb.value));await pc.setLocalDescription(await pc.createAnswer());flash('send answer code')}
go.onclick=async()=>{await pc.setRemoteDescription(unpack(inb.value));flash('signal accepted')}
peer.onclick=()=>net.classList.toggle('show');
tilt.onclick=async()=>{try{if(DeviceOrientationEvent.requestPermission)await DeviceOrientationEvent.requestPermission();addEventListener('deviceorientation',e=>tiltX=Math.max(-1,Math.min(1,(e.gamma||0)/33)));flash('tilt active')}catch(e){flash('tilt blocked · drag steer')}};
addEventListener('deviceorientation',e=>tiltX=Math.max(-1,Math.min(1,(e.gamma||0)/33)));
addEventListener('pointerdown',e=>{down=1;started=1;drag=(e.clientX/W-.5)*2});addEventListener('pointermove',e=>{if(down)drag=(e.clientX/W-.5)*2});addEventListener('pointerup',()=>down=0);
function bike(x,y,s,h,n){g.save();g.translate(x,y);g.scale(s,s);g.fillStyle=`hsl(${h},95%,58%)`;g.shadowColor=g.fillStyle;g.shadowBlur=18;g.beginPath();g.moveTo(0,-28);g.lineTo(13,5);g.lineTo(7,31);g.lineTo(-7,31);g.lineTo(-13,5);g.closePath();g.fill();g.shadowBlur=0;g.fillStyle='#111';g.fillRect(-10,-3,20,22);g.fillStyle='#fff';g.fillRect(-3,-34,6,10);g.restore();if(n){g.fillStyle='#fff';g.font='700 11px system-ui';g.textAlign='center';g.fillText(n,x,y-38*s)}}
function drawRoad(){let sky=g.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#111b38');sky.addColorStop(.55,'#070912');sky.addColorStop(1,'#020307');g.fillStyle=sky;g.fillRect(0,0,W,H);g.fillStyle='#091425';for(let i=0;i<90;i++){let z=P.z+i*90,yy=H*(.18+.82*(i/90)**1.7),ny=H*(.18+.82*((i+1)/90)**1.7),sc=(i/90)**1.45,cx=W/2+(curve(z)-curve(P.z))*W*.58*sc,rw=W*(.12+.78*sc)*edge(z),ncx=W/2+(curve(z+90)-curve(P.z))*W*.58*((i+1)/90)**1.45,nrw=W*(.12+.78*((i+1)/90)**1.45)*edge(z+90);g.fillStyle=i%2?'#202836':'#18202c';g.beginPath();g.moveTo(cx-rw,yy);g.lineTo(cx+rw,yy);g.lineTo(ncx+nrw,ny);g.lineTo(ncx-nrw,ny);g.fill();g.strokeStyle='#12f7';g.lineWidth=2;g.beginPath();g.moveTo(cx-rw*.92,yy);g.lineTo(ncx-nrw*.92,ny);g.moveTo(cx+rw*.92,yy);g.lineTo(ncx+nrw*.92,ny);g.stroke();if(i%7==0){g.strokeStyle='#fff8';g.lineWidth=4;g.beginPath();g.moveTo(cx,yy);g.lineTo(ncx,ny);g.stroke()}if(i%16==0){g.fillStyle='#0ff';g.fillRect(cx-rw*1.04,yy,3,16);g.fillRect(cx+rw*1.04,yy,3,16)}}}
function mark(o){let dz=pos(o)-pos(P);if(dz<-80||dz>2600)return;let t=Math.max(0,Math.min(1,dz/2600)),y=H*(.84-.66*t**.55),sc=(1-t)*.85+.16,cx=W/2+(curve(P.z+dz)-curve(P.z)+o.x*.9)*W*.46*(1-t*.3);let l=labels[o.id]||{x:cx,y:y};l.x+=((cx)-l.x)*.18;l.y+=(y-l.y)*.18;labels[o.id]=l;bike(l.x,l.y,sc*.72,o.h,o.name);}
function step(t){let dt=Math.min(.033,(t-last)/1e3||.016);last=t;let steer=down?drag:tiltX,road=edge(P.z),c=curve(P.z+180)-curve(P.z);P.v+=(down||started?1.35:.15)*dt;P.v*=P.x>road||P.x<-road?.95:.993;P.v=Math.min(P.v,1.08);P.x+=(steer*.95-c*1.9)*dt*(.55+P.v);P.x=Math.max(-1.15,Math.min(1.15,P.x));P.z+=P.v*280*dt;if(P.z>L){P.z-=L;P.lap++;boost=1;flash('lap '+(P.lap+1))}drawRoad();Object.values(peers).forEach(mark);bike(W/2+P.x*W*.34,H*.82,1.08,hue,me);let all=[P,...Object.values(peers).filter(o=>performance.now()-o.t<4000)].sort((a,b)=>pos(b)-pos(a));let r=all.findIndex(o=>o.id==me)+1;rank.textContent='P'+r;stat.textContent=((P.v*290)|0)+' km/h · lap '+(P.lap+1)+' · '+all.length+' riders';list.innerHTML=all.map((o,i)=>`<span class=tag style="background:hsl(${o.h},90%,35%)">${i+1} ${o.name}</span>`).join('');if(t%90<17)send();requestAnimationFrame(step)}requestAnimationFrame(step)
})();
</script></body></html>
