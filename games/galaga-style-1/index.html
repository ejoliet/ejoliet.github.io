<!doctype html><meta charset=utf-8><title>13K Star Swarm</title><style>html,body{margin:0;height:100%;background:#02030a;color:#9ff;font:16px monospace;overflow:hidden}canvas{display:block;margin:auto;image-rendering:pixelated;width:min(100vw,900px);height:100vh;background:radial-gradient(#07142a,#02030a)}#h{position:fixed;inset:10px auto auto 10px;text-shadow:0 0 9px #0ff}#m{position:fixed;inset:40% 0 auto;text-align:center;color:white;text-shadow:0 0 12px #0ff;font-size:20px}b{color:#ff5}</style><canvas id=c width=480 height=720></canvas><div id=h></div><div id=m></div><script>
(()=>{let C=c.getContext`2d`,W=c.width,H=c.height,K={},B=[],E=[],P=[],S=[],score=0,lives=3,level=1,cool=0,ecool=80,dir=1,drop=0,state=0,t=0,hi=+localStorage.hi13k||0,shake=0;onkeydown=e=>{K[e.key]=1;if(!state&&e.key==' ')start();if(state==2&&e.key==' ')start()};onkeyup=e=>K[e.key]=0;let R=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y,cl=(v,a,b)=>v<a?a:v>b?b:v,beep=(f,d=.05)=>{try{let A=new AudioContext,o=A.createOscillator(),g=A.createGain();o.frequency.value=f;o.type='square';g.gain.value=.025;o.connect(g);g.connect(A.destination);o.start();o.stop(A.currentTime+d)}catch(e){}};function start(){score=0;lives=3;level=1;state=1;newWave()}function newWave(){E=[];P=[];B=[];S=[];dir=1;drop=0;for(let i=0;i<5;i++)for(let j=0;j<9;j++)E.push({x:46+j*43,y:70+i*34,w:24,h:18,a:i%2});for(let i=0;i<80;i++)S.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+.3});p={x:W/2-14,y:H-70,w:28,h:22,iv:80};m.innerHTML=''}function boom(x,y,n=12){for(;n--;)P.push({x,y,vx:Math.random()*6-3,vy:Math.random()*6-3,r:Math.random()*3+1,a:40})}function shot(x,y,vy,good){B.push({x,y,w:3,h:10,vy,good});beep(good?650:190,.03)}function ship(o){C.fillStyle=o?'#f45':'#6ff';C.beginPath();C.moveTo(p.x+14,p.y);C.lineTo(p.x+28,p.y+22);C.lineTo(p.x,p.y+22);C.fill();C.fillStyle='#fff';C.fillRect(p.x+11,p.y+8,6,6)}function enemy(e){C.fillStyle=e.a?'#fb3':'#8f8';C.fillRect(e.x+4,e.y,e.w-8,4);C.fillRect(e.x,e.y+4,e.w,10);C.fillRect(e.x+5,e.y+14,4,4);C.fillRect(e.x+15,e.y+14,4,4);C.fillStyle='#021';C.fillRect(e.x+6,e.y+7,4,3);C.fillRect(e.x+15,e.y+7,4,3)}function update(){if(!state)return;t++;S.map(s=>{s.y+=s.s;if(s.y>H)s.y=0});if(state==2)return;let sp=K.Shift?5:3;if(K.ArrowLeft||K.a)p.x-=sp;if(K.ArrowRight||K.d)p.x+=sp;p.x=cl(p.x,8,W-p.w-8);if((K[' ']||K.ArrowUp||K.w)&&cool<1){shot(p.x+13,p.y-8,-8,1);cool=15}cool--;if(p.iv)p.iv--;let hit=0;E.map(e=>{e.x+=dir*(.35+level*.08);if(e.x<10||e.x+e.w>W-10)hit=1});if(hit){dir*=-1;E.map(e=>e.y+=14);drop++}if(--ecool<1&&E.length){let e=E[Math.random()*E.length|0];shot(e.x+12,e.y+18,3+level*.25,0);ecool=Math.max(18,75-level*5)}B=B.filter(b=>b.y>-20&&b.y<H+20);B.map(b=>b.y+=b.vy);B.map(b=>{if(b.good)E.map(e=>{if(!e.dead&&R(b,e)){e.dead=b.dead=1;score+=10*level;boom(e.x+12,e.y+9);beep(900,.04)}});else if(!p.iv&&R(b,p)){b.dead=1;lives--;p.iv=90;shake=12;boom(p.x+14,p.y+11,22);if(lives<1){state=2;hi=Math.max(hi,score);localStorage.hi13k=hi;m.innerHTML='GAME OVER<br><b>SPACE</b> to restart'}}});E=E.filter(e=>!e.dead);B=B.filter(b=>!b.dead);P=P.filter(q=>q.a--).map(q=>(q.x+=q.vx,q.y+=q.vy,q));if(E.some(e=>e.y>p.y-20)){lives=0;state=2;m.innerHTML='SWARM LANDED<br><b>SPACE</b> to restart'}if(!E.length){level++;newWave()}h.innerHTML=`SCORE ${score} &nbsp; HI ${hi} &nbsp; LIVES ${lives} &nbsp; WAVE ${level}`}function render(){C.save();if(shake){C.translate(Math.random()*shake-shake/2,Math.random()*shake-shake/2);shake--}C.clearRect(0,0,W,H);C.fillStyle='#123';S.map(s=>C.fillRect(s.x,s.y,s.s,s.s));C.strokeStyle='#0ff5';C.beginPath();C.moveTo(0,H-35);C.lineTo(W,H-35);C.stroke();E.map(enemy);B.map(b=>{C.fillStyle=b.good?'#ff5':'#f6a';C.fillRect(b.x,b.y,b.w,b.h)});P.map(q=>{C.fillStyle=`rgba(255,${120+q.a*3},80,${q.a/40})`;C.fillRect(q.x,q.y,q.r,q.r)});if(state==1&&(!p.iv||t%8<4))ship();C.restore();if(!state)m.innerHTML='13K STAR SWARM<br><b>SPACE</b> start<br>Arrows/A-D move · Space/W shoot · Shift boost'}let loop=()=>{update();render();requestAnimationFrame(loop)};loop()})();
</script>
