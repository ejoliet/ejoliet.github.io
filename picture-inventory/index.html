<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Picture Inventory</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f7fb;
      --card: #ffffff;
      --fg: #15233b;
      --muted: #5e6e85;
      --accent: #2563eb;
      --accent-2: #0ea5e9;
      --danger: #dc2626;
      --border: #d9e2ef;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #111c33;
        --fg: #e9f1ff;
        --muted: #9fb0cb;
        --accent: #60a5fa;
        --accent-2: #38bdf8;
        --danger: #f87171;
        --border: #22314f;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, color-mix(in srgb, var(--accent-2) 16%, var(--bg)), var(--bg) 45%);
      color: var(--fg);
      min-height: 100vh;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }
    .hero, .panel, .item {
      background: color-mix(in srgb, var(--card) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.08);
    }
    .hero { padding: 18px; margin-bottom: 12px; }
    h1 { margin: 0 0 6px; font-size: 1.35rem; }
    p { margin: 0; color: var(--muted); line-height: 1.45; }
    .panel { padding: 12px; margin-bottom: 14px; }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.92rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    .btn.secondary { background: color-mix(in srgb, var(--accent) 12%, var(--card)); color: var(--fg); border: 1px solid var(--border); }
    .btn.danger { background: var(--danger); }
    .hint { font-size: 0.85rem; margin-top: 8px; }
    .feed {
      display: grid;
      gap: 10px;
    }
    .item {
      overflow: hidden;
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 10px;
      padding: 10px;
    }
    .thumb {
      width: 108px;
      height: 108px;
      border-radius: 10px;
      border: 1px solid var(--border);
      object-fit: cover;
      background: #0001;
    }
    .meta { min-width: 0; }
    .meta h3 {
      margin: 0 0 4px;
      font-size: 1rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .small {
      color: var(--muted);
      font-size: 0.84rem;
      margin-bottom: 8px;
    }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .empty {
      text-align: center;
      padding: 20px 10px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--muted);
    }
    .status {
      margin-top: 8px;
      min-height: 1.1rem;
      font-size: 0.87rem;
      color: var(--muted);
    }
    @media (max-width: 560px) {
      .item { grid-template-columns: 84px 1fr; }
      .thumb { width: 84px; height: 84px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Picture Inventory</h1>
      <p>Save and browse photos shared from iOS Shortcut input using <code>#image=BASE64_JPEG</code>.</p>
    </section>

    <section class="panel">
      <div class="row">
        <label class="btn secondary" for="picker">Add from file</label>
        <input id="picker" type="file" accept="image/*" hidden>
        <button id="clear-all" class="btn danger" type="button">Clear all</button>
      </div>
      <p class="hint">Setup: edit <code>picture-inventory/Picture-Inventory.shortcut</code>, replace <code>YOUR_HOST</code> (for this repo use <code>ejoliet.github.io</code>), then import the shortcut on iOS (see README) and share one image from Photos.</p>
      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <section id="feed" class="feed"></section>
  </main>

  <script>
    (function () {
      const storageKey = "pictureInventoryItemsV1";
      const feed = document.getElementById("feed");
      const status = document.getElementById("status");
      const picker = document.getElementById("picker");
      const clearAll = document.getElementById("clear-all");
      const maxItems = 100;

      const toKB = (n) => (n > 0 && n < 1024) ? "< 1 KB" : `${Math.round(n / 1024)} KB`;
      const nowIso = () => new Date().toISOString();
      const fmtDate = (iso) => new Date(iso).toLocaleString();

      function setStatus(msg) {
        status.textContent = msg || "";
      }

      function safeParse(json, fallback) {
        try { return JSON.parse(json); } catch (_) { return fallback; }
      }

      function loadItems() {
        return safeParse(localStorage.getItem(storageKey) || "[]", []);
      }

      function saveItems(items) {
        localStorage.setItem(storageKey, JSON.stringify(items.slice(0, maxItems)));
      }

      // Extract and validate base64 payload from #image=... hash.
      function buildDataUrlFromHash() {
        const hash = location.hash.startsWith("#") ? location.hash.slice(1) : location.hash;
        const prefix = "image=";
        if (!hash || !hash.startsWith(prefix)) return null;
        const raw = hash.slice(prefix.length);
        if (!raw) return null;
        const decoded = decodeURIComponent(raw.replace(/\s/g, ""));
        const base64 = decoded.replace(/^data:image\/(?:jpeg|jpg);base64,/i, "");
        if (!/^[A-Za-z0-9+/=]+$/.test(base64)) return null;
        if ((base64.length % 4) !== 0) return null;
        if (/=/.test(base64.slice(0, -2))) return null;
        return `data:image/jpeg;base64,${base64}`;
      }

      function imageMeta(dataUrl) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
          img.onerror = () => reject(new Error("Could not read image"));
          img.src = dataUrl;
        });
      }

      function fingerprint(dataUrl) {
        const body = dataUrl.split(",", 2)[1] || "";
        return `${body.length}:${body.slice(0, 24)}:${body.slice(-24)}`;
      }

      function render(items) {
        if (!items.length) {
          feed.innerHTML = `<div class="empty">No pictures yet. Share one from iOS Shortcut or add from file.</div>`;
          return;
        }
        feed.innerHTML = items.map((item) => `
          <article class="item">
            <img class="thumb" loading="lazy" src="${item.dataUrl}" alt="${item.name}">
            <div class="meta">
              <h3 title="${item.name}">${item.name}</h3>
              <div class="small">${fmtDate(item.createdAt)} · ${item.width}×${item.height} · ${toKB(item.bytes)}</div>
              <div class="actions">
                <a class="btn secondary" href="${item.dataUrl}" target="_blank" rel="noopener">Open</a>
                <a class="btn secondary" href="${item.dataUrl}" download="${item.downloadName}">Download</a>
                <button class="btn secondary" type="button" data-copy="${item.id}">Copy Base64</button>
                <button class="btn danger" type="button" data-delete="${item.id}">Delete</button>
              </div>
            </div>
          </article>
        `).join("");
      }

      function toJpegName(name) {
        const base = (name || "picture").replace(/\.[^.]+$/, "").trim();
        return `${base}.jpg`;
      }

      function createId() {
        if (globalThis.crypto && crypto.randomUUID) return crypto.randomUUID();
        if (globalThis.crypto && crypto.getRandomValues) {
          const arr = new Uint32Array(4);
          crypto.getRandomValues(arr);
          return `pic-${Date.now()}-${Array.from(arr, (n) => n.toString(16)).join("")}`;
        }
        return `pic-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      // Add one data URL image into persistent inventory (if not duplicate).
      async function addImage(dataUrl, source) {
        const items = loadItems();
        const fp = fingerprint(dataUrl);
        if (items.some((x) => x.fingerprint === fp && x.dataUrl === dataUrl)) {
          setStatus("Image already exists in inventory.");
          return;
        }
        const meta = await imageMeta(dataUrl);
        const payload = dataUrl.split(",", 2)[1] || "";
        const padMatch = payload.match(/=+$/);
        const pad = padMatch ? padMatch[0].length : 0;
        const bytes = Math.max(0, Math.floor((payload.length * 3) / 4) - pad);
        const item = {
          id: createId(),
          fingerprint: fp,
          name: source || `Picture ${items.length + 1}`,
          downloadName: toJpegName(source || `picture-${items.length + 1}`),
          createdAt: nowIso(),
          width: meta.width,
          height: meta.height,
          bytes,
          dataUrl
        };
        items.unshift(item);
        saveItems(items);
        render(loadItems());
        setStatus("Added image to inventory.");
      }

      // Convert a File to resized/compressed JPEG data URL.
      async function toJpegDataUrl(file, maxDim = 1024, quality = 0.7) {
        const src = URL.createObjectURL(file);
        try {
          const img = await new Promise((resolve, reject) => {
            const el = new Image();
            el.onload = () => resolve(el);
            el.onerror = () => reject(new Error("Invalid image"));
            el.src = src;
          });
          const largestDim = Math.max(img.naturalWidth, img.naturalHeight);
          if (!Number.isFinite(largestDim) || largestDim <= 0) {
            throw new Error("Image has invalid dimensions");
          }
          const scale = Math.min(1, maxDim / largestDim);
          const w = Math.max(1, Math.round(img.naturalWidth * scale));
          const h = Math.max(1, Math.round(img.naturalHeight * scale));
          const canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          return canvas.toDataURL("image/jpeg", quality);
        } finally {
          URL.revokeObjectURL(src);
        }
      }

      picker.addEventListener("change", async () => {
        const file = picker.files && picker.files[0];
        if (!file) return;
        try {
          const dataUrl = await toJpegDataUrl(file);
          await addImage(dataUrl, file.name.replace(/\.[^.]+$/, ""));
        } catch (err) {
          setStatus(err?.message || "Failed to add file.");
        } finally {
          picker.value = "";
        }
      });

      clearAll.addEventListener("click", () => {
        if (!confirm("Delete all saved pictures from this browser?")) return;
        localStorage.removeItem(storageKey);
        render([]);
        setStatus("Inventory cleared.");
      });

      feed.addEventListener("click", async (event) => {
        const target = event.target;
        const id = target.getAttribute("data-delete");
        if (id) {
          const items = loadItems().filter((x) => x.id !== id);
          saveItems(items);
          render(items);
          setStatus("Deleted image.");
          return;
        }
        const copyId = target.getAttribute("data-copy");
        if (copyId) {
          const item = loadItems().find((x) => x.id === copyId);
          if (!item) return;
          const b64 = item.dataUrl.replace(/^data:image\/jpeg;base64,/, "");
          try {
            await navigator.clipboard.writeText(b64);
            setStatus("Base64 copied to clipboard.");
          } catch (_) {
            setStatus("Clipboard copy not available in this browser.");
          }
        }
      });

      render(loadItems());

      (async function importFromHashIfPresent() {
        const dataUrl = buildDataUrlFromHash();
        if (!dataUrl) return;
        try {
          await addImage(dataUrl, "Shared photo");
          history.replaceState(null, "", location.pathname);
        } catch (err) {
          console.error(err);
          setStatus("Could not import image from URL hash.");
        }
      })();
    })();
  </script>
</body>
</html>
