name: popvote CI

on:
  push:
    paths:
      - "popvote/**"
      - ".github/workflows/popvote-ci.yml"
  pull_request:
    paths:
      - "popvote/**"
      - ".github/workflows/popvote-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: popvote
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run check-syntax
      - run: npm test
